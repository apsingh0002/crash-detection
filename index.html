<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ACM — Orbital Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

:root {
  --bg:       #010914;
  --bg2:      #030f1e;
  --bg3:      #071828;
  --border:   #0d3a5c;
  --accent:   #00c8ff;
  --accent2:  #0066ff;
  --green:    #00ff88;
  --yellow:   #ffcc00;
  --red:      #ff3344;
  --orange:   #ff6600;
  --text:     #c8e8ff;
  --dim:      #3a6080;
  --glow:     0 0 12px rgba(0,200,255,0.4);
  --glow-red: 0 0 12px rgba(255,50,50,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: grid;
  grid-template-rows: 52px 1fr;
  grid-template-columns: 260px 1fr 280px;
  grid-template-areas:
    "header header header"
    "left   center right";
}

/* ── HEADER ── */
header {
  grid-area: header;
  background: linear-gradient(90deg, #010914 0%, #071828 50%, #010914 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 24px;
  position: relative;
}
header::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent);
  letter-spacing: 4px;
}
.header-status {
  display: flex; gap: 20px; align-items: center; flex: 1;
}
.hstat {
  display: flex; flex-direction: column;
  font-family: 'Share Tech Mono', monospace;
}
.hstat-label { font-size: 9px; color: var(--dim); letter-spacing: 2px; }
.hstat-val   { font-size: 13px; color: var(--accent); }
.sim-time {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px; color: var(--green);
  text-shadow: 0 0 10px var(--green);
}
.live-dot {
  width:8px; height:8px; border-radius:50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── PANELS ── */
.panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--dim);
  padding: 12px 14px 6px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}

/* ── LEFT PANEL — Satellite Fleet ── */
#left  { grid-area: left; }
#right { grid-area: right; border-right: none; border-left: 1px solid var(--border); }

.sat-card {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(13,58,92,0.5);
  cursor: pointer;
  transition: background 0.15s;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px;
}
.sat-card:hover { background: rgba(0,200,255,0.04); }
.sat-card.selected { background: rgba(0,200,255,0.08); border-left: 2px solid var(--accent); }
.sat-id   { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent); }
.sat-status-badge {
  font-size: 9px; padding: 1px 6px; border-radius:2px;
  font-family:'Share Tech Mono',monospace; letter-spacing:1px;
}
.badge-NOMINAL   { background:rgba(0,255,136,0.15); color:var(--green); }
.badge-EVADING   { background:rgba(255,204,0,0.15);  color:var(--yellow); animation: badge-blink 1s infinite; }
.badge-GRAVEYARD { background:rgba(255,50,50,0.1);   color:var(--red); }
@keyframes badge-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

.fuel-bar-wrap { grid-column: 1/-1; margin-top:4px; }
.fuel-bar-bg   { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; }
.fuel-bar-fill { height:100%; border-radius:2px; transition: width 0.5s; }

/* ── CENTER — Globe + Map ── */
#center {
  grid-area: center;
  display: flex; flex-direction: column;
  position: relative;
}
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
canvas#globe { width:100%!important; height:100%!important; display:block; }

/* Ground track overlay */
#groundtrack {
  position: absolute; inset: 0;
  pointer-events: none;
}

/* Tabs bar at bottom of center */
.center-tabs {
  height: 44px;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px;
}
.tab-btn {
  background: none; border: 1px solid var(--border);
  color: var(--dim); font-family:'Orbitron',monospace;
  font-size: 9px; letter-spacing: 2px;
  padding: 4px 12px; cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover, .tab-btn.active {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,200,255,0.06);
}

/* ── RIGHT PANEL — CDMs + Timeline ── */
.cdm-item {
  padding: 8px 14px;
  border-bottom: 1px solid rgba(13,58,92,0.4);
  display: grid; grid-template-columns: auto 1fr; gap: 6px 10px;
  align-items: center;
}
.risk-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.risk-CRITICAL { background:var(--red);    box-shadow:0 0 6px var(--red); }
.risk-WARNING  { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }

.cdm-sats  { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text); }
.cdm-dist  { font-size:10px; color:var(--dim); grid-column:2; }

/* Bullseye Plot */
#bullseye-wrap {
  padding: 14px;
  border-bottom: 1px solid var(--border);
}
canvas#bullseye { display:block; margin:0 auto; }

/* Maneuver Timeline */
#timeline {
  padding: 14px;
}
.timeline-row {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 6px;
  font-family:'Share Tech Mono',monospace; font-size:10px;
}
.tl-id   { color: var(--accent); width: 120px; overflow: hidden; text-overflow: ellipsis; white-space:nowrap; }
.tl-bar  { flex:1; height:12px; border-radius:2px; position:relative; }
.tl-burn { height:100%; border-radius:2px; background: var(--accent2); }
.tl-cool { height:100%; border-radius:2px; background: rgba(255,102,0,0.4); }
.tl-status { color:var(--dim); font-size:9px; }

/* Fuel heatmap */
#fuel-grid {
  display: grid; grid-template-columns: repeat(5,1fr); gap:4px;
  padding: 12px;
}
.fuel-cell {
  aspect-ratio:1; border-radius:3px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:8px; font-family:'Share Tech Mono',monospace;
  border: 1px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.fuel-cell:hover { transform: scale(1.05); }

/* Controls bar */
.controls {
  display: flex; gap: 8px; align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.btn {
  background: rgba(0,200,255,0.08);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family:'Orbitron',monospace;
  font-size:8px; letter-spacing:1px;
  padding: 5px 10px; cursor:pointer;
  transition: all 0.15s;
}
.btn:hover  { background: rgba(0,200,255,0.18); }
.btn:active { transform: scale(0.97); }
.btn-red    { border-color:var(--red); color:var(--red); background:rgba(255,50,50,0.06); }
.btn-red:hover { background:rgba(255,50,50,0.14); }
.step-input {
  background: var(--bg3); border:1px solid var(--border);
  color:var(--text); font-family:'Share Tech Mono',monospace;
  padding:4px 8px; width:70px; font-size:12px;
}

/* Toast notifications */
#toasts {
  position: fixed; top:60px; right:16px;
  display:flex; flex-direction:column; gap:6px;
  z-index:999; pointer-events:none;
}
.toast {
  background: var(--bg3); border-left:3px solid var(--accent);
  padding: 8px 14px; font-family:'Share Tech Mono',monospace;
  font-size:11px; animation: toast-in 0.3s ease;
  max-width:300px;
}
.toast-warn { border-color:var(--yellow); }
.toast-err  { border-color:var(--red); }
@keyframes toast-in { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="logo">◈ ACM</div>
  <div class="header-status">
    <div class="live-dot"></div>
    <div class="hstat"><span class="hstat-label">SATELLITES</span><span class="hstat-val" id="h-sats">—</span></div>
    <div class="hstat"><span class="hstat-label">DEBRIS TRACKED</span><span class="hstat-val" id="h-deb">—</span></div>
    <div class="hstat"><span class="hstat-label">ACTIVE CDMs</span><span class="hstat-val" id="h-cdms" style="color:var(--yellow)">—</span></div>
    <div class="hstat"><span class="hstat-label">COLLISIONS</span><span class="hstat-val" id="h-col" style="color:var(--red)">0</span></div>
  </div>
  <div class="sim-time" id="sim-time">—</div>
</header>

<!-- LEFT: Fleet -->
<div class="panel" id="left">
  <div class="panel-title">◈ Satellite Fleet</div>
  <div class="controls">
    <input class="step-input" id="step-val" type="number" value="3600" min="1"/>
    <button class="btn" onclick="doStep()">▶ STEP</button>
    <button class="btn" onclick="autoRun()" id="auto-btn">⟳ AUTO</button>
    <button class="btn btn-red" onclick="stopAuto()" id="stop-btn" style="display:none">■ STOP</button>
  </div>
  <div id="fleet-list"></div>
</div>

<!-- CENTER: Globe -->
<div id="center">
  <div id="canvas-wrap">
    <canvas id="globe"></canvas>
    <canvas id="groundtrack" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  </div>
  <div class="center-tabs">
    <button class="tab-btn active" onclick="switchTab('globe',this)">3D GLOBE</button>
    <button class="tab-btn" onclick="switchTab('groundtrack',this)">GROUND TRACK</button>
    <button class="tab-btn" onclick="switchTab('fuel',this)">FUEL HEATMAP</button>
  </div>
  <!-- Ground track canvas (full overlay, toggled) -->
  <div id="tab-groundtrack" style="display:none;position:absolute;inset:0;bottom:44px;">
    <canvas id="gt-canvas" style="width:100%;height:100%;"></canvas>
  </div>
  <div id="tab-fuel" style="display:none;position:absolute;inset:0;bottom:44px;overflow-y:auto;background:var(--bg2);">
    <div class="panel-title">◈ Fuel Heatmap — Fleet</div>
    <div id="fuel-grid"></div>
    <div style="padding:12px;">
      <canvas id="dv-chart" style="width:100%;height:120px;"></canvas>
    </div>
  </div>
</div>

<!-- RIGHT: CDMs + Bullseye + Timeline -->
<div class="panel" id="right">
  <div class="panel-title">◈ Conjunction Warnings</div>
  <div id="cdm-list"></div>

  <div id="bullseye-wrap">
    <div class="panel-title" style="border:none;padding-top:0">◈ Bullseye — Closest Approach</div>
    <canvas id="bullseye" width="240" height="240"></canvas>
  </div>

  <div class="panel-title">◈ Maneuver Timeline</div>
  <div id="timeline"></div>
</div>

<div id="toasts"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000/api';
let state = {
  satellites: [], debris: [], cdms: [],
  selected: null, simTime: '—',
  maneuvers: [], totalCollisions: 0,
  dvHistory: [], fuelHistory: [],
  autoInterval: null
};

// ── THREE.js Globe ─────────────────────────────────────────────────────────
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 2.8);

// Earth
const earthGeo  = new THREE.SphereGeometry(1, 64, 64);
const earthMat  = new THREE.MeshPhongMaterial({
  color: 0x0a1a2e, emissive: 0x001122,
  specular: 0x224488, shininess: 20, wireframe: false,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Grid lines
const gridGeo = new THREE.SphereGeometry(1.001, 24, 12);
const gridMat = new THREE.MeshBasicMaterial({
  color: 0x0d3a5c, wireframe: true, transparent: true, opacity: 0.25
});
scene.add(new THREE.Mesh(gridGeo, gridMat));

// Atmosphere glow
const atmGeo = new THREE.SphereGeometry(1.05, 32, 32);
const atmMat = new THREE.MeshPhongMaterial({
  color: 0x0066ff, transparent: true, opacity: 0.06,
  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(atmGeo, atmMat));

// Lights
scene.add(new THREE.AmbientLight(0x223344, 1.2));
const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// Stars
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 2000; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 80 + Math.random() * 100;
  starPos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0x88bbdd, size:0.15 })));

// Satellite meshes
const satMeshes  = {};
const satTrails  = {};
const debrisDots = new THREE.Group();
scene.add(debrisDots);

function latLonToVec3(lat, lon, r=1.02) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function updateGlobe() {
  // Debris cloud
  debrisDots.clear();
  const debGeo = new THREE.BufferGeometry();
  const debPos = [];
  state.debris.forEach(([id, lat, lon, alt]) => {
    const r = 1.0 + (alt / 6378);
    const v = latLonToVec3(lat, lon, Math.min(r, 1.25));
    debPos.push(v.x, v.y, v.z);
  });
  if (debPos.length) {
    debGeo.setAttribute('position', new THREE.Float32BufferAttribute(debPos, 3));
    const debMesh = new THREE.Points(debGeo,
      new THREE.PointsMaterial({ color:0x444466, size:0.008, transparent:true, opacity:0.6 }));
    debrisDots.add(debMesh);
  }

  // CDM warning positions (red dots)
  const critIds = new Set(state.cdms.filter(c=>c.risk_level==='CRITICAL').map(c=>c.debris_id));

  // Satellites
  state.satellites.forEach(sat => {
    const pos = latLonToVec3(sat.lat, sat.lon, 1.08);
    let mesh = satMeshes[sat.id];
    if (!mesh) {
      const geo = new THREE.SphereGeometry(0.018, 8, 8);
      const mat = new THREE.MeshBasicMaterial({ color: 0x00c8ff });
      mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      satMeshes[sat.id] = mesh;
      satTrails[sat.id] = [];
    }
    mesh.position.copy(pos);
    // Color by status
    const col = sat.status==='GRAVEYARD' ? 0xff3344 :
                sat.status==='EVADING'   ? 0xffcc00 : 0x00c8ff;
    mesh.material.color.setHex(col);
    if (sat.id === state.selected) {
      mesh.material.color.setHex(0xffffff);
      mesh.scale.setScalar(1.5);
    } else {
      mesh.scale.setScalar(1.0);
    }
  });
}

// Mouse drag rotation
let isDragging=false, prevMouse={x:0,y:0};
canvas.addEventListener('mousedown', e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',   ()=>isDragging=false);
window.addEventListener('mousemove', e=>{
  if (!isDragging) return;
  const dx=(e.clientX-prevMouse.x)*0.005;
  const dy=(e.clientY-prevMouse.y)*0.005;
  earth.rotation.y += dx;
  earth.rotation.x += dy;
  debrisDots.rotation.y += dx;
  debrisDots.rotation.x += dy;
  Object.values(satMeshes).forEach(m=>{m.rotation.y+=dx;m.rotation.x+=dy;});
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('click', e=>{
  // Pick satellite
  const rect=canvas.getBoundingClientRect();
  const mouse=new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
  const ray=new THREE.Raycaster();
  ray.setFromCamera(mouse, camera);
  const hits=ray.intersectObjects(Object.values(satMeshes));
  if (hits.length) {
    const id=Object.keys(satMeshes).find(k=>satMeshes[k]===hits[0].object);
    state.selected=id;
    renderFleet(); renderBullseye(); renderTimeline();
  }
});

function resizeRenderer() {
  const wrap=document.getElementById('canvas-wrap');
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeRenderer);
resizeRenderer();

let globeRotating=true;
function animate() {
  requestAnimationFrame(animate);
  if (globeRotating) earth.rotation.y += 0.0008;
  renderer.render(scene, camera);
}
animate();


// ── Ground Track Canvas ─────────────────────────────────────────────────────
function renderGroundTrack() {
  const cv=document.getElementById('gt-canvas');
  const W=cv.parentElement.clientWidth, H=cv.parentElement.clientHeight;
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // World map background
  ctx.fillStyle='#010914';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#0d3a5c'; ctx.lineWidth=0.5;
  for(let lat=-90;lat<=90;lat+=30){
    const y=H/2-(lat/90)*(H/2);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  for(let lon=-180;lon<=180;lon+=30){
    const x=(lon+180)/360*W;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.strokeStyle='#1a5080'; ctx.lineWidth=1;
  // Equator
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

  // Terminator line (approx solar declination)
  const now=new Date();
  const dayOfYear=Math.floor((now-(new Date(now.getFullYear(),0,0)))/86400000);
  const decl=23.45*Math.sin(2*Math.PI*(dayOfYear-80)/365)*Math.PI/180;
  ctx.strokeStyle='rgba(255,200,100,0.4)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
  ctx.beginPath();
  for(let lon=-180;lon<=180;lon+=2){
    const x=(lon+180)/360*W;
    const termLat=Math.atan(-Math.cos(lon*Math.PI/180)/Math.tan(decl))*180/Math.PI;
    const y=H/2-(termLat/90)*(H/2);
    if(lon===-180) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Debris
  ctx.fillStyle='rgba(80,80,120,0.5)';
  state.debris.forEach(([id,lat,lon,alt])=>{
    const x=(lon+180)/360*W, y=H/2-(lat/90)*(H/2);
    ctx.fillRect(x-1,y-1,2,2);
  });

  // Satellites
  state.satellites.forEach(sat=>{
    const x=(sat.lon+180)/360*W, y=H/2-(sat.lat/90)*(H/2);
    const col = sat.status==='GRAVEYARD'?'#ff3344':sat.status==='EVADING'?'#ffcc00':'#00c8ff';
    ctx.beginPath(); ctx.arc(x,y,sat.id===state.selected?7:4,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    if(sat.id===state.selected){
      ctx.fillStyle='white'; ctx.font='10px Share Tech Mono';
      ctx.fillText(sat.id,x+8,y+4);
    }
  });

  // Ground stations
  const stations=[
    {n:'ISTRAC',lat:13.03,lon:77.52},{n:'SVB',lat:78.23,lon:15.41},
    {n:'GLD',lat:35.43,lon:-116.89},{n:'PTA',lat:-53.15,lon:-70.92},
    {n:'IITD',lat:28.54,lon:77.19},{n:'MCM',lat:-77.85,lon:166.67},
  ];
  stations.forEach(gs=>{
    const x=(gs.lon+180)/360*W, y=H/2-(gs.lat/90)*(H/2);
    ctx.fillStyle='#00ff88';
    ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x+4,y+3); ctx.lineTo(x-4,y+3); ctx.closePath();
    ctx.fill();
    ctx.fillStyle='rgba(0,255,136,0.5)'; ctx.font='8px Share Tech Mono';
    ctx.fillText(gs.n,x+6,y+3);
  });
}


// ── Bullseye Plot ─────────────────────────────────────────────────────────
function renderBullseye() {
  const cv=document.getElementById('bullseye');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height, cx=W/2, cy=H/2, R=W/2-20;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#030f1e'; ctx.fillRect(0,0,W,H);

  // Rings
  [0.25,0.5,0.75,1.0].forEach((f,i)=>{
    const r=R*f;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=i===3?'rgba(255,50,50,0.3)':'rgba(13,58,92,0.8)';
    ctx.lineWidth=i===3?1.5:0.8; ctx.stroke();
    const lbl=i===3?'CRIT':i===2?'5km':i===1?'2km':'1km';
    ctx.fillStyle='#3a6080'; ctx.font='8px Share Tech Mono';
    ctx.fillText(lbl,cx+r*0.7,cy);
  });

  // Cross-hairs
  ctx.strokeStyle='rgba(13,58,92,0.6)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.stroke();

  // Satellite center
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#00c8ff'; ctx.fill();
  ctx.fillStyle='rgba(0,200,255,0.2)';
  ctx.beginPath(); ctx.arc(cx,cy,12,0,Math.PI*2); ctx.fill();

  if (!state.selected) return;
  const sel_cdms=state.cdms.filter(c=>c.satellite_id===state.selected);
  sel_cdms.forEach((cdm,i)=>{
    const angle=i*(Math.PI*2/Math.max(sel_cdms.length,1));
    const dist=Math.min(cdm.miss_distance_km/5*R, R*0.98);
    const x=cx+dist*Math.cos(angle);
    const y=cy+dist*Math.sin(angle);
    const col=cdm.risk_level==='CRITICAL'?'#ff3344':'#ffcc00';
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=0.5; ctx.stroke();
  });

  if (sel_cdms.length===0) {
    ctx.fillStyle='rgba(0,255,136,0.4)'; ctx.font='11px Share Tech Mono';
    ctx.textAlign='center'; ctx.fillText('NO THREATS', cx, cy+30); ctx.textAlign='left';
  }
}


// ── Fleet List ─────────────────────────────────────────────────────────────
function renderFleet() {
  const el=document.getElementById('fleet-list');
  el.innerHTML=state.satellites.map(sat=>{
    const pct=(sat.fuel_kg/50*100).toFixed(0);
    const col=pct>50?'var(--green)':pct>20?'var(--yellow)':'var(--red)';
    const sel=sat.id===state.selected?'selected':'';
    return `<div class="sat-card ${sel}" onclick="selectSat('${sat.id}')">
      <span class="sat-id">${sat.id}</span>
      <span class="sat-status-badge badge-${sat.status}">${sat.status}</span>
      <div class="fuel-bar-wrap">
        <div class="fuel-bar-bg">
          <div class="fuel-bar-fill" style="width:${pct}%;background:${col}"></div>
        </div>
      </div>
      <span style="font-size:9px;color:var(--dim);font-family:'Share Tech Mono',monospace">
        ⛽ ${sat.fuel_kg.toFixed(1)} kg (${pct}%)
      </span>
    </div>`;
  }).join('');
}


// ── CDM List ───────────────────────────────────────────────────────────────
function renderCDMs() {
  const el=document.getElementById('cdm-list');
  if (!state.cdms.length) {
    el.innerHTML='<div style="padding:12px;color:var(--green);font-family:Share Tech Mono,monospace;font-size:11px">✓ No active conjunctions</div>';
    return;
  }
  el.innerHTML=state.cdms.slice(0,15).map(c=>`
    <div class="cdm-item" onclick="selectSat('${c.satellite_id}')">
      <div class="risk-dot risk-${c.risk_level}"></div>
      <div>
        <div class="cdm-sats">${c.satellite_id}</div>
        <div class="cdm-dist">↔ ${c.debris_id}</div>
        <div class="cdm-dist">${c.miss_distance_km.toFixed(3)} km miss</div>
      </div>
    </div>`).join('');
}


// ── Maneuver Timeline ───────────────────────────────────────────────────────
function renderTimeline() {
  const el=document.getElementById('timeline');
  if (!state.maneuvers.length) {
    el.innerHTML='<div style="padding:12px;color:var(--dim);font-family:Share Tech Mono,monospace;font-size:10px">No maneuvers scheduled</div>';
    return;
  }
  const recent=state.maneuvers.slice(-12).reverse();
  el.innerHTML=recent.map(m=>{
    const col=m.status==='EXECUTED'?'var(--green)':m.status==='FAILED'?'var(--red)':'var(--accent)';
    return `<div class="timeline-row">
      <span class="tl-id">${m.burn_id||m.satellite_id}</span>
      <span style="color:${col};font-size:9px">${m.status}</span>
    </div>`;
  }).join('');
}


// ── Fuel Heatmap ────────────────────────────────────────────────────────────
function renderFuelHeatmap() {
  const el=document.getElementById('fuel-grid');
  el.innerHTML=state.satellites.map(sat=>{
    const pct=sat.fuel_kg/50;
    const r=Math.round(255*(1-pct)), g=Math.round(200*pct);
    const bg=`rgba(${r},${g},50,0.7)`;
    const border=sat.id===state.selected?'var(--accent)':'transparent';
    return `<div class="fuel-cell" style="background:${bg};border-color:${border}" onclick="selectSat('${sat.id}')">
      <span>${sat.id.split('-').pop()}</span>
      <span>${(pct*100).toFixed(0)}%</span>
    </div>`;
  }).join('');
}


// ── Tabs ────────────────────────────────────────────────────────────────────
let activeTab='globe';
function switchTab(tab, btn) {
  activeTab=tab;
  document.getElementById('canvas-wrap').style.display=tab==='globe'?'block':'none';
  document.getElementById('tab-groundtrack').style.display=tab==='groundtrack'?'block':'none';
  document.getElementById('tab-fuel').style.display=tab==='fuel'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (tab==='groundtrack') renderGroundTrack();
  if (tab==='fuel') renderFuelHeatmap();
}


// ── Select Satellite ────────────────────────────────────────────────────────
function selectSat(id) {
  state.selected=id;
  renderFleet(); renderBullseye(); renderTimeline(); renderFuelHeatmap();
  showToast(`Selected: ${id}`, 'info');
}


// ── API calls ───────────────────────────────────────────────────────────────
async function fetchSnapshot() {
  try {
    const res=await fetch(`${API}/visualization/snapshot`);
    const data=await res.json();
    state.satellites = data.satellites || [];
    state.debris     = data.debris_cloud || [];
    state.cdms       = data.active_cdms || [];
    state.simTime    = data.timestamp;

    // Update header
    document.getElementById('h-sats').textContent = state.satellites.length;
    document.getElementById('h-deb').textContent  = state.debris.length;
    document.getElementById('h-cdms').textContent = state.cdms.length;
    document.getElementById('sim-time').textContent = state.simTime.replace('T',' ').replace('.000Z',' UTC');

    renderFleet(); renderCDMs(); renderBullseye(); updateGlobe();
    if (activeTab==='groundtrack') renderGroundTrack();
    if (activeTab==='fuel') renderFuelHeatmap();
  } catch(e) {
    showToast('API unreachable — start backend on :8000', 'err');
  }
}

async function doStep() {
  const s=parseInt(document.getElementById('step-val').value)||3600;
  try {
    const res=await fetch(`${API}/simulate/step`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({step_seconds:s})
    });
    const data=await res.json();
    if (data.collisions_detected > 0) {
      state.totalCollisions += data.collisions_detected;
      document.getElementById('h-col').textContent=state.totalCollisions;
      showToast(`⚠ ${data.collisions_detected} COLLISION(S) DETECTED`, 'err');
    }
    if (data.maneuvers_executed > 0) {
      showToast(`✓ ${data.maneuvers_executed} maneuver(s) executed`, 'info');
    }
    await fetchSnapshot();
  } catch(e) {
    showToast('Step failed — backend error', 'err');
  }
}

let autoTimer=null;
function autoRun() {
  if (autoTimer) return;
  document.getElementById('auto-btn').style.display='none';
  document.getElementById('stop-btn').style.display='';
  autoTimer=setInterval(doStep, 2000);
}
function stopAuto() {
  clearInterval(autoTimer); autoTimer=null;
  document.getElementById('auto-btn').style.display='';
  document.getElementById('stop-btn').style.display='none';
}


// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const el=document.createElement('div');
  el.className=`toast ${type==='err'?'toast-err':type==='warn'?'toast-warn':''}`;
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}


// ── Init ─────────────────────────────────────────────────────────────────
fetchSnapshot();
setInterval(fetchSnapshot, 5000);
</script>
